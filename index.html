<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HAZE Hookah Lounge — Design Options</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0b0910;color:#f4eee6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:72px 24px;}
  .wrap{max-width:960px;margin:0 auto;}
  h1{font-size:34px;letter-spacing:.02em;margin-bottom:8px;}
  .sub{color:#8f879c;font-size:16px;margin-bottom:48px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;}
  a.card{display:block;text-decoration:none;color:inherit;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:28px;background:#120f17;transition:transform .15s ease,border-color .15s ease;}
  a.card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.2);}
  .swatch{display:flex;gap:8px;margin-bottom:18px;}
  .dot{width:26px;height:26px;border-radius:50%;}
  .g{background:radial-gradient(circle at 35% 30%,#ffd98a,#c9a24b 55%,#6e5322);}
  .m{background:#ff3d8b;}
  .c{background:#35e0d0;}
  h2{font-size:20px;margin-bottom:6px;}
  .tag{color:#8f879c;font-size:14px;}
  .foot{color:#6b6474;font-size:13px;margin-top:48px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>HAZE <span style="color:#c9a24b;">·</span> Hookah Lounge</h1>
  <p class="sub">Design options for review. Open each to preview the full page.</p>
  <div class="grid">
    <a class="card" href="design-1/index.html">
      <div class="swatch"><span class="dot g"></span><span class="dot m"></span></div>
      <h2>Option 1A</h2>
      <p class="tag">Gold × Magenta Neon</p>
    </a>
    <a class="card" href="design-2/index.html">
      <div class="swatch"><span class="dot g"></span><span class="dot c"></span></div>
      <h2>Option 1B</h2>
      <p class="tag">Gold × Electric Cyan</p>
    </a>
  </div>
  <p class="foot">More alternatives coming soon.</p>
</div>
</body>
</html>
