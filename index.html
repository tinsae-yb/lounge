<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#0b0910;min-height:100vh;display:flex;justify-content:center;padding:56px 24px;font-family:'Space Grotesk',sans-serif;}
  .frame{width:1080px;max-width:100%;}

  /* ---- interaction ---- */
  html{scroll-behavior:smooth;}
  a{color:inherit;text-decoration:none;}
  [id]{scroll-margin-top:24px;}
  .btn{cursor:pointer;display:inline-block;transition:transform .15s ease,filter .15s ease;}
  .btn:hover{transform:translateY(-2px);filter:brightness(1.07);}
  .contact-link{transition:color .15s ease;}
  .contact-link:hover{color:#fff;}

  /* ---- nav ---- */
  .nav{display:flex;align-items:center;justify-content:space-between;padding:22px 40px;border-bottom:1px solid rgba(255,255,255,.06);position:relative;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-dot{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffd98a,#c9a24b 55%,#6e5322);box-shadow:0 0 18px rgba(201,162,75,.6);}
  .brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:.02em;color:#f4eee6;}
  .nav-links{display:flex;align-items:center;gap:30px;font-size:15px;color:#b7afc0;font-weight:500;}
  .nav-link{cursor:pointer;transition:color .15s ease;}
  .nav-link:hover{color:#f4eee6;}
  .btn-reserve{padding:10px 20px;background:#ff3d8b;color:#120f17;border-radius:999px;font-weight:700;font-family:'Syne',sans-serif;}
  .nav-toggle{display:none;}
  .nav-burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;}
  .nav-burger span{width:24px;height:2px;background:#f4eee6;border-radius:2px;transition:.2s;}

  /* ---- responsive ---- */
  @media (max-width:760px){
    body{padding:16px 10px !important;}
    .nav{padding:18px 22px;}
    .nav-burger{display:flex;}
    .nav-links{display:none;width:100%;flex-direction:column;align-items:flex-start;gap:14px;margin-top:16px;}
    .nav-toggle:checked ~ .nav-links{display:flex;}
    .btn-reserve{width:100%;text-align:center;}
    .hero{padding:44px 22px 54px !important;}
    .hero h1{font-size:46px !important;}
    .hero-photo{position:static !important;width:100% !important;height:220px !important;margin-top:28px;right:auto !important;bottom:auto !important;}
    .menu-grid{grid-template-columns:1fr !important;gap:32px !important;}
    .info-grid{grid-template-columns:1fr !important;}
    .info-grid > div{border-right:none !important;padding:40px 24px !important;}
    .section-pad{padding-left:22px !important;padding-right:22px !important;}
  }
</style>
</head>
<body>
<div class="frame">

    

    <div style="border-radius:20px; overflow:hidden; background:#120f17; box-shadow:0 40px 100px rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.06);">

      <!-- nav -->
      <header class="nav" id="top">
        <a class="brand" href="#top">
          <span class="brand-dot"></span>
          <span class="brand-name">Dusk <span style="color:#c9a24b;">RVA</span></span>
        </a>
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-burger" aria-label="Toggle menu"><span></span><span></span><span></span></label>
        <nav class="nav-links">
          <a class="nav-link" href="#menu">Menu</a>
          <a class="nav-link" href="#hours">Hours</a>
          <a class="nav-link" href="#location">Location</a>
          <a class="btn btn-reserve" href="#location">Reserve</a>
        </nav>
      </header>

      <!-- hero -->
      <div class="hero" style="position:relative; padding:74px 40px 84px; overflow:hidden;">
        <div style="position:absolute; top:-120px; right:-80px; width:520px; height:520px; border-radius:50%; background:radial-gradient(circle, rgba(255,61,139,.34), transparent 62%); filter:blur(6px);"></div>
        <div style="position:absolute; bottom:-160px; left:-60px; width:420px; height:420px; border-radius:50%; background:radial-gradient(circle, rgba(201,162,75,.26), transparent 62%);"></div>
        <div style="position:relative; max-width:640px;">
          <div style="display:inline-flex; align-items:center; gap:8px; padding:7px 14px; border:1px solid rgba(255,61,139,.4); border-radius:999px; font-size:12px; letter-spacing:.16em; color:#ff86b6; font-weight:700; text-transform:uppercase;">
            <span style="width:6px; height:6px; border-radius:50%; background:#ff3d8b; animation:hz-pulse 1.6s infinite;"></span> Open Late · Every Night
          </div>
          <h1 style="font-family:'Syne',sans-serif; font-weight:800; font-size:84px; line-height:.96; letter-spacing:-.02em; margin:26px 0 0; color:#f7f2ea;">Smoke,<br>sound &amp; <span style="color:#ff3d8b;">soul.</span></h1>
          <p style="font-size:18px; line-height:1.6; color:#b7afc0; max-width:460px; margin:24px 0 34px;">A late-night hookah lounge where premium shisha meets a room full of good energy. Pull up, exhale, stay a while.</p>
          <div style="display:flex; gap:14px; flex-wrap:wrap;">
            <a class="btn" href="#menu" style="padding:15px 30px; background:#c9a24b; color:#120f17; border-radius:999px; font-family:'Syne',sans-serif; font-weight:800; font-size:16px;">See the Menu</a>
            <a class="btn" href="#location" style="padding:15px 30px; border:1px solid rgba(255,255,255,.18); color:#f4eee6; border-radius:999px; font-weight:700; font-size:16px;">Book a Table</a>
          </div>
        </div>
        <div class="hero-photo" style="position:absolute; right:40px; bottom:60px; width:300px; height:360px; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,.1); box-shadow:0 20px 50px rgba(0,0,0,.5);">
          <img src="assets/hero.jpg" alt="Dusk RVA hookah lounge" loading="lazy" style="width:100%; height:100%; object-fit:cover; display:block;">
        </div>
      </div>

      <!-- MENU -->
      <div id="menu" class="section-pad" style="padding:16px 40px 60px;">
        <div style="display:flex; align-items:baseline; justify-content:space-between; border-top:1px solid rgba(255,255,255,.08); padding-top:44px; margin-bottom:34px;">
          <h2 style="font-family:'Syne',sans-serif; font-weight:800; font-size:44px; color:#f4eee6; margin:0;">The Menu</h2>
        </div>
        <div class="menu-grid" id="menu-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:48px;"></div>
      </div>

      <!-- HOURS & LOCATION -->
      <div class="info-grid" style="display:grid; grid-template-columns:1fr 1fr; background:linear-gradient(120deg,#1a1422,#150f1d);">
        <div id="hours" style="padding:52px 40px; border-right:1px solid rgba(255,255,255,.06);">
          <h3 style="font-family:'Syne',sans-serif; font-weight:800; font-size:26px; color:#f4eee6; margin:0 0 24px;">Hours</h3>
          <div id="hours-list" style="display:flex; flex-direction:column; gap:14px;"></div>
        </div>
        <div id="location" style="padding:52px 40px;">
          <h3 style="font-family:'Syne',sans-serif; font-weight:800; font-size:26px; color:#f4eee6; margin:0 0 24px;">Find Us</h3>
          <div id="location-body"></div>
        </div>
      </div>

      <!-- POLICIES -->
      <div id="policies" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; padding:28px 40px; border-top:1px solid rgba(255,255,255,.06);"></div>

      <div style="padding:22px 40px; text-align:center; font-size:13px; color:#6c6479; border-top:1px solid rgba(255,255,255,.06);">© 2026 Dusk RVA</div>
    </div>
  
</div>
<script>
(function(){
  var T={accent:'#ff3d8b',accentSoft:'#ff86b6',gold:'#c9a24b',goldSoft:'#e0c37f',price:'#c9a24b',text:'#f4eee6',muted:'#8f879c',contact:'#e0c37f',onAccent:'#120f17'};
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function mapHref(q){var query=encodeURIComponent(q);var apple=/iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent||'');return apple?'https://maps.apple.com/?q='+query:'https://www.google.com/maps/search/?api=1&query='+query;}
  function accentOf(cat){return cat.accent==='gold'?{dot:T.gold,head:T.goldSoft}:{dot:T.accent,head:T.accentSoft};}
  function heading(a,title){return '<div style="display:flex; align-items:center; gap:10px; margin-bottom:22px;"><span style="width:8px;height:8px;background:'+a.dot+';border-radius:50%;"></span><h3 style="font-family:\'Syne\',sans-serif; font-weight:700; font-size:15px; letter-spacing:.14em; text-transform:uppercase; color:'+a.head+'; margin:0;">'+esc(title)+'</h3></div>';}
  function itemsColumn(cat){
    var a=accentOf(cat);
    var rows=cat.items.map(function(it,i){
      var last=i===cat.items.length-1;
      var border=last?'padding-bottom:2px;':'border-bottom:1px dashed rgba(255,255,255,.1); padding-bottom:14px;';
      var badge=it.special?' <span style="font-size:11px; color:'+T.onAccent+'; background:'+T.accent+'; padding:2px 8px; border-radius:999px; font-weight:800; vertical-align:middle;">'+esc(it.badge||'HOUSE')+'</span>':'';
      var desc=it.description?'<div style="font-size:13px; color:'+T.muted+';">'+esc(it.description)+'</div>':'';
      return '<div style="display:flex; justify-content:space-between; align-items:baseline; gap:14px; '+border+'"><div><div style="font-weight:700; font-size:17px; color:'+T.text+';">'+esc(it.name)+badge+'</div>'+desc+'</div><span style="font-family:\'Syne\',sans-serif; font-weight:800; color:'+T.price+'; font-size:17px;">'+esc(it.price)+'</span></div>';
    }).join('');
    return '<div>'+heading(a,cat.category)+'<div style="display:flex; flex-direction:column; gap:16px;">'+rows+'</div></div>';
  }
  function brandsColumn(cat){
    var a=accentOf(cat);
    var price=cat.price?'<div style="display:inline-flex; align-items:baseline; gap:8px; margin-bottom:26px; padding:9px 16px; border-radius:999px; background:rgba(255,61,139,.12); border:1px solid rgba(255,61,139,.32);"><span style="font-family:\'Syne\',sans-serif; font-weight:800; color:'+T.price+'; font-size:18px;">'+esc(cat.price)+'</span>'+(cat.priceNote?'<span style="font-size:13px; color:'+T.muted+';">'+esc(cat.priceNote)+'</span>':'')+'</div>':'';
    var brands=(cat.brands||[]).map(function(b){
      var chips=(b.flavors||[]).map(function(f){return '<span style="display:inline-block; padding:6px 12px; margin:0 7px 8px 0; border-radius:999px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.09); font-size:13px; color:'+T.text+';">'+esc(f)+'</span>';}).join('');
      return '<div style="margin-bottom:24px;"><div style="font-family:\'Syne\',sans-serif; font-weight:800; font-size:16px; color:'+a.head+'; margin-bottom:12px;">'+esc(b.name)+'</div><div style="display:flex; flex-wrap:wrap;">'+chips+'</div></div>';
    }).join('');
    return '<div>'+heading(a,cat.category)+price+brands+'</div>';
  }
  function column(cat){return cat.type==='brands'?brandsColumn(cat):itemsColumn(cat);}
  function render(d){
    var mg=document.getElementById('menu-grid');
    if(mg&&d.menu)mg.innerHTML=d.menu.map(column).join('');
    var hl=document.getElementById('hours-list');
    if(hl&&d.hours)hl.innerHTML=d.hours.map(function(h){return '<div style="display:flex; justify-content:space-between; font-size:16px;"><span style="color:#b7afc0;">'+esc(h.days)+'</span><span style="color:'+(h.highlight?T.accentSoft:T.text)+'; font-weight:700;">'+esc(h.time)+'</span></div>';}).join('');
    var pol=document.getElementById('policies');
    if(pol&&d.policies)pol.innerHTML=d.policies.map(function(p){return '<span style="display:inline-flex; align-items:center; gap:9px; padding:9px 16px; border-radius:999px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); font-size:13px; font-weight:600; color:#b7afc0;"><span style="width:6px; height:6px; border-radius:50%; background:'+T.accent+';"></span>'+esc(p)+'</span>';}).join('');
    var lb=document.getElementById('location-body');
    if(lb){
      var loc=d.location||{},c=d.contact||{};
      var addr=(loc.addressLines||[]).map(esc).join('<br>');
      var href=mapHref(loc.mapsQuery||(loc.addressLines||[]).join(', '));
      var s='<a class="contact-link" href="'+href+'" target="_blank" rel="noopener" style="display:block; font-size:16px; line-height:1.6; color:#b7afc0; margin:0 0 18px;">'+addr+'</a>';
      if(c.reserveNote)s+='<p style="font-size:16px; line-height:1.6; color:'+T.text+'; font-weight:700; margin:0 0 12px;">'+esc(c.reserveNote)+'</p>';
      s+='<div style="display:flex; flex-direction:column; gap:8px; font-size:15px; color:'+T.contact+';">';
      if(c.phoneDial)s+='<a class="contact-link" href="tel:'+esc(c.phoneDial)+'">'+esc(c.phoneDisplay||c.phoneDial)+'</a>';
      if(c.email)s+='<a class="contact-link" href="mailto:'+esc(c.email)+'">'+esc(c.email)+'</a>';
      s+='</div>';
      lb.innerHTML=s;
    }
  }
  fetch('data.json').then(function(r){return r.json();}).then(render).catch(function(e){console.error('Could not load data.json',e);});
})();
</script>
